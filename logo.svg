<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg" width="500" height="500">
  <defs>
    <linearGradient id="shield-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A237E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D1B5E;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="neural-pattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="1.5" fill="#00BCD4" opacity="0.3"/>
      <circle cx="20" cy="20" r="1.5" fill="#00BCD4" opacity="0.3"/>
      <circle cx="35" cy="35" r="1.5" fill="#00BCD4" opacity="0.3"/>
      <line x1="5" y1="5" x2="20" y2="20" stroke="#00BCD4" stroke-width="0.5" opacity="0.2"/>
      <line x1="20" y1="20" x2="35" y2="35" stroke="#00BCD4" stroke-width="0.5" opacity="0.2"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="#F5F5F5"/>

  <!-- Neural network background pattern -->
  <rect x="120" y="80" width="260" height="240" fill="url(#neural-pattern)" rx="20"/>